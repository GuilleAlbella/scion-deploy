# SCION single-VM deploy.
#
# Brings up backend (FastAPI/uvicorn), frontend (Next.js standalone),
# nginx (single public port), and watchtower (auto-pull on new GHCR
# images, every 6h). SQLite lives on a named volume so rebuilds and
# image upgrades preserve state.
#
# Usage on the VM:
#   cp .env.example .env   &&   $EDITOR .env
#   docker compose pull
#   docker compose up -d
#
# Environment defaults assume the GHCR images are public.

# Compose project name. Without this, Compose derives the project from
# the parent directory name. Pinning to "scion" gives clean, predictable
# resource identifiers (`scion_default`, `scion_data`, `scion-backend`).
name: scion

services:
  backend:
    image: ${SCION_BACKEND_IMAGE:-ghcr.io/guillealbella/scion-backend:latest}
    container_name: scion-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/scion.db
      SCION_EXECUTION_MODE: docker
      SCION_BACKEND_HOST: 0.0.0.0
      SCION_BACKEND_PORT: "8000"
      DATA_REGION: ${DATA_REGION:-unset}
      # TAISA AI provider config is baked into the backend image. No
      # runtime env injection needed.
      API_KEY: ${API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - data:/data
    networks: [default]

  frontend:
    image: ${SCION_FRONTEND_IMAGE:-ghcr.io/guillealbella/scion-frontend:latest}
    container_name: scion-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Same-origin via nginx — see nginx.conf.
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_API_KEY: ${API_KEY:-}
    networks: [default]

  nginx:
    # nginx 1.29-alpine — actively rebuilt by upstream. The previous
    # pin (`1.27-alpine`) hadn't been refreshed in 12 months and had
    # accumulated 79 OS-level CVEs (3 Critical) that all evaporated
    # with this bump.
    image: nginx:1.29-alpine
    container_name: scion-nginx
    restart: unless-stopped
    depends_on: [backend, frontend]
    ports:
      - "${SCION_PUBLIC_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [default]

  # Watchtower removed in v1.21.4. The maintained fork
  # `beatkind/watchtower` had also gone stale (31 CVEs incl. 1
  # Critical from old Go stdlib), and the auto-update saved at most
  # ~3 s vs running `update.ps1` / `update.sh` manually. Users run
  # the script when they want; the docker.sock mount that
  # Watchtower required was a root-equivalent attack surface we no
  # longer need.

volumes:
  data:

# `default` network is implicit — Compose creates `scion_default`
# automatically. No need to declare it explicitly.
