# SCION nginx reverse proxy.
#
# One public port (80) routes:
#   /api/*      → backend:8000   (FastAPI)
#   /health*    → backend:8000   (readiness/liveness)
#   /           → frontend:3000  (Next.js standalone)
#
# Customers therefore only need one port open on the VM, and the
# browser sees same-origin so no CORS gymnastics on the API.

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs go to container stdout/stderr — picked up by `docker logs`.
    log_format  scion  '$remote_addr - $request_time "$request" '
                       '$status $body_bytes_sent "$http_user_agent"';
    access_log /dev/stdout scion;
    error_log  /dev/stderr warn;

    sendfile        on;
    keepalive_timeout 65;

    # Generous body size for dictionary-export uploads (Transcend ~80MB).
    client_max_body_size 200m;

    # Long timeouts: ingest pipelines can take minutes.
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    upstream scion_backend  { server backend:8000;  }
    upstream scion_frontend { server frontend:3000; }

    server {
        listen 80 default_server;
        server_name _;

        # Backend API and health.
        location /api/ {
            proxy_pass         http://scion_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Stream long responses (ingest progress) without buffering.
            proxy_buffering    off;
        }

        # Public health probe — rewrites to the versioned readiness
        # endpoint so external monitors hit a stable URL.
        location = /healthz {
            proxy_pass         http://scion_backend/api/v1/health/ready;
            proxy_http_version 1.1;
        }

        # Everything else is the Next.js app (incl. /_next/* assets).
        location / {
            proxy_pass         http://scion_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
